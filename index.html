<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator/title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Calculator/h1>
    <div id="container">
        <div id="display"><p>345678</p></div>
        <div id="digits">
            <button class="digitBtn" id="1">1</button>
            <button class="digitBtn" id="2">2</button>
            <button class="digitBtn" id="3">3</button>
            <button class="digitBtn" id="4">4</button>
            <button class="digitBtn" id="5">5</button>
            <button class="digitBtn" id="6">6</button>
            <button class="digitBtn" id="7">7</button>
            <button class="digitBtn" id="8">8</button>
            <button class="digitBtn" id="9">9</button>
        </div>
        <div id="operators">
            <button class="operatorBtn" id="+">+</button>
            <button class="operatorBtn" id="-">-</button>
            <button class="operatorBtn" id="*">*</button>
            <button class="operatorBtn" id="/">/</button>
            <button class="operatorBtn" id="=">=</button>
        </div>
        <div><button id="clear">clear input</button></div>
    </div>
</body>
</html>
